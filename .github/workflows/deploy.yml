name: Deploy to TestFlight

on:
  push:
    branches:
      - main        # Déclenche à chaque push sur main
  workflow_dispatch: # Permet aussi de lancer manuellement

jobs:
  deploy:
    name: Build & Deploy iOS
    runs-on: macos-latest   # Obligatoire pour builder iOS

    steps:
      # 1. Récupère le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installe Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      # 3. Installe les dépendances Dart/Flutter
      - name: Install Flutter dependencies
        run: flutter pub get

      # 4. Installe Ruby + Fastlane
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      # 5. Configure les certificats de signature (via secret GitHub)
      - name: Setup signing certificates
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GIT_PRIVATE_KEY: ${{ secrets.GIT_PRIVATE_KEY }}
        run: |
          # Configure SSH pour accéder au repo des certificats
          mkdir -p ~/.ssh
          echo "$GIT_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # 6. Crée le fichier api_key.json depuis le secret GitHub
      - name: Create App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: echo "$APP_STORE_CONNECT_API_KEY" > fastlane/api_key.json

      # 7. Lance Fastlane pour builder et uploader sur TestFlight
      - name: Deploy to TestFlight
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane beta

      # 8. Nettoie les fichiers sensibles
      - name: Cleanup secrets
        if: always()
        run: |
          rm -f fastlane/api_key.json
          rm -f ~/.ssh/id_rsa
