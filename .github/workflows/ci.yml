name: CI — Build Check (develop)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-check:
    name: Validate Flutter Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Flutter Web (validation only)
        run: flutter build web --release --base-href "/Application-bancaire/"
